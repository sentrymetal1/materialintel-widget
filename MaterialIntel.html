<!DOCTYPE html>
<html>
<head>
    <script src="https://js.zohocdn.com/creator/widgets/version/1.0/widgetsdk-min.js"></script>
</head>
<body>
    <!-- Silent Poller - No UI Elements Needed -->
    <script>
        let lastTrigger = "";
        let projectId = "";

        ZOHO.CREATOR.init().then(function(data) {
            // 1. Get Project ID from Page Parameters
            const queryParams = ZOHO.CREATOR.UTIL.getQueryParams();
            projectId = queryParams["project_id"]; 
            
            // 2. Start Polling Loop (Every 3 seconds)
            setInterval(checkTrigger, 3000);
        });

        function checkTrigger() {
            if (!projectId) return;

            const config = {
                appName: "mcp-customer-project",
                reportName: "All_Mcp_customer_Projects", 
                criteria: "(ID == " + projectId + ")"
            }

            ZOHO.CREATOR.API.getAllRecords(config).then(function(response) {
                const record = response.data[0];
                const currentTrigger = record.Intel_Trigger;

                // 3. If Trigger changes (and isn't empty), Message the Parent
                if (currentTrigger && currentTrigger !== lastTrigger) {
                    lastTrigger = currentTrigger;
                    
                    // The "Shout" to the Snippet
                    window.parent.postMessage({
                        type: "INTEL_UPDATE",
                        payload: currentTrigger
                    }, "*");
                }
            });
        }
    </script>
</body>
</html>
