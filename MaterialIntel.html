<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://js.zohostatic.com/creator/widgets/version/1.0/widgetsdk-min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: transparent; overflow: hidden; pointer-events: none; }

#mi-status { position: fixed; bottom: 6px; right: 6px; background: #1a1a1a; color: #00ff00; padding: 3px 7px; border-radius: 4px; font-family: monospace; font-size: 10px; z-index: 99999; opacity: 0.75; pointer-events: none; }

#mi-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15,23,42,0.5); backdrop-filter: blur(3px); z-index: 9998; pointer-events: all; align-items: center; justify-content: center; }
#mi-overlay.show { display: flex; }

#mi-modal { background: #fff; border-radius: 14px; width: 520px; max-width: 96vw; max-height: 90vh; box-shadow: 0 24px 64px rgba(0,0,0,0.3); display: flex; flex-direction: column; overflow: hidden; pointer-events: all; animation: miPopIn 0.22s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes miPopIn { from { transform: scale(0.9) translateY(12px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

#mi-modal-header { background: linear-gradient(135deg, #1e40af, #3b82f6); color: white; padding: 14px 18px; display: flex; align-items: flex-start; justify-content: space-between; flex-shrink: 0; }
#mi-header-info { flex: 1; min-width: 0; }
#mi-eyebrow { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.65; }
#mi-panel-subtitle { font-size: 15px; font-weight: 700; margin-top: 3px; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#mi-close { background: rgba(255,255,255,0.15); border: none; color: white; width: 26px; height: 26px; border-radius: 50%; cursor: pointer; font-size: 14px; line-height: 26px; text-align: center; flex-shrink: 0; margin-left: 12px; margin-top: 2px; }
#mi-close:hover { background: rgba(255,255,255,0.3); }

#mi-tabs { display: flex; border-bottom: 1px solid #e4e7ec; flex-shrink: 0; }
.mi-tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-size: 12px; font-weight: 600; color: #888; border-bottom: 2px solid transparent; transition: all 0.15s; pointer-events: all; }
.mi-tab.active { color: #2563eb; border-bottom-color: #2563eb; }

#mi-body { flex: 1; overflow-y: auto; padding: 16px; }

.mi-section { margin-bottom: 16px; }
.mi-section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #9BA3B0; margin-bottom: 8px; }
.mi-price-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
.mi-price-box { background: #f9fafb; border-radius: 8px; padding: 10px 12px; border: 1px solid #f0f0f0; }
.mi-price-box.hl { background: #eff6ff; border-color: #bfdbfe; }
.mi-price-box .lbl { font-size: 9px; color: #999; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; }
.mi-price-box .val { font-size: 18px; font-weight: 700; color: #1a1a1a; margin-top: 3px; font-family: 'JetBrains Mono', monospace; }
.mi-price-box.hl .val { color: #2563eb; }
.mi-total-quotes { font-size: 11px; color: #aaa; margin-top: 8px; }
.mi-trend-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; }
.mi-trend-up { background: #fef2f2; color: #dc2626; }
.mi-trend-down { background: #f0fdf4; color: #16a34a; }
.mi-trend-flat { background: #f0f9ff; color: #0284c7; }
.mi-trend-insufficient { background: #f9fafb; color: #9ca3af; }
.mi-table { width: 100%; border-collapse: collapse; }
.mi-table th { font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; color: #999; font-weight: 600; padding: 4px 0 6px; border-bottom: 1px solid #f0f0f0; text-align: left; }
.mi-table td { padding: 6px 0; border-bottom: 1px solid #f9f9f9; font-size: 12px; color: #2d2d2d; vertical-align: middle; }
.mi-table tr:last-child td { border-bottom: none; }
.mi-bar-wrap { background: #f0f0f0; border-radius: 4px; height: 5px; width: 60px; overflow: hidden; display: inline-block; vertical-align: middle; margin-left: 6px; }
.mi-bar-fill { height: 100%; border-radius: 4px; background: #2563eb; }
.mi-badge { display: inline-block; background: #f0f0f0; color: #555; border-radius: 4px; padding: 2px 6px; font-size: 11px; font-family: 'JetBrains Mono', monospace; }
.mi-loading { text-align: center; color: #aaa; padding: 40px 0; font-size: 13px; }
.mi-error { color: #dc2626; font-size: 12px; padding: 12px; background: #fef2f2; border-radius: 6px; }
.mi-no-data { text-align: center; padding: 32px 16px; color: #9ca3af; }
.mi-no-data-icon { font-size: 32px; margin-bottom: 8px; }
.mi-no-data-text { font-size: 13px; font-weight: 600; }
.mi-no-data-sub { font-size: 11px; margin-top: 4px; }
</style>
</head>
<body>

<div id="mi-status"></div>

<div id="mi-overlay" onclick="miOverlayClick(event)">
    <div id="mi-modal">
        <div id="mi-modal-header">
            <div id="mi-header-info">
                <div id="mi-eyebrow">Material Intelligence</div>
                <div id="mi-panel-subtitle"></div>
            </div>
            <button id="mi-close" onclick="miClose()">✕</button>
        </div>
        <div id="mi-tabs">
            <div class="mi-tab active" id="mi-tab-my" onclick="miSwitchTab('my')">My Quotes</div>
            <div class="mi-tab" id="mi-tab-industry" onclick="miSwitchTab('industry')">Industry</div>
        </div>
        <div id="mi-body"><div class="mi-loading">Loading...</div></div>
    </div>
</div>

<script>
var miCache = {};
var miCurrentParams = null;
var miCurrentTab = 'my';
var miLastTrigger = '';
var miProjectId = null;
var miManufacturerId = null;
var miFirstPoll = true;

// project_id will be resolved after SDK init

function miSetStatus(msg) { var el = document.getElementById('mi-status'); if (el) el.textContent = msg; }

function miOpen() {
    document.body.style.pointerEvents = 'all';
    document.getElementById('mi-overlay').classList.add('show');
    try { ZOHO.CREATOR.UI.resize({ width: "100%", height: "100%" }); } catch(e) {}
}
function miClose() {
    document.getElementById('mi-overlay').classList.remove('show');
    document.body.style.pointerEvents = 'none';
    try { ZOHO.CREATOR.UI.resize({ width: "1px", height: "1px" }); } catch(e) {}
}
function miOverlayClick(e) { if (e.target === document.getElementById('mi-overlay')) miClose(); }

function miSwitchTab(tab) {
    miCurrentTab = tab;
    document.getElementById('mi-tab-my').className = 'mi-tab' + (tab === 'my' ? ' active' : '');
    document.getElementById('mi-tab-industry').className = 'mi-tab' + (tab === 'industry' ? ' active' : '');
    if (miCurrentParams) miLoadData(tab, miCurrentParams);
}

function miFmt(val) { if (!val && val !== 0) return '—'; return '$' + parseFloat(val).toFixed(4); }

function miTrendBadge(trend) {
    var map = { 'up': ['mi-trend-up','▲','Trending Up'], 'down': ['mi-trend-down','▼','Trending Down'], 'flat': ['mi-trend-flat','→','Stable'], 'insufficient-data': ['mi-trend-insufficient','—','Insufficient Data'] };
    var t = map[trend] || map['insufficient-data'];
    return '<span class="mi-trend-badge ' + t[0] + '"><span>' + t[1] + '</span> ' + t[2] + '</span>';
}

function miProcessRecords(records) {
    if (!records || records.length === 0) return { total_quotes:0, last_paid:0, min_price:0, max_price:0, avg_price:0, trend:'insufficient-data', recent_avg:0, recent_count:0, supplier_summary:[], lead_time_summary:[] };
    var total=0, min=null, max=null, lastPaid=0, supTotals={}, supCounts={}, ltCounts={};
    var cutoff=new Date(); cutoff.setDate(cutoff.getDate()-90);
    var recentTotal=0, recentCount=0, first=true, validCount=0;
    records.forEach(function(r) {
        var price=parseFloat(r.Price_Per_Lb)||0;
        if (price<=0) return;
        validCount++;
        var sup=r.Supplier_LU||'Unknown', lt=r.Lead_Time_Drop_Down||'', qd=r.Quote_Date?new Date(r.Quote_Date):null;
        if (first) { lastPaid=price; first=false; }
        if (min===null||price<min) min=price;
        if (max===null||price>max) max=price;
        total+=price;
        if (!supTotals[sup]) { supTotals[sup]=0; supCounts[sup]=0; }
        supTotals[sup]+=price; supCounts[sup]++;
        if (lt&&lt!=='null') ltCounts[lt]=(ltCounts[lt]||0)+1;
        if (qd&&qd>=cutoff) { recentTotal+=price; recentCount++; }
    });
    if (validCount===0) return { total_quotes:0, last_paid:0, min_price:0, max_price:0, avg_price:0, trend:'insufficient-data', recent_avg:0, recent_count:0, supplier_summary:[], lead_time_summary:[] };
    var avg=total/validCount, recentAvg=recentCount>0?recentTotal/recentCount:0, trend='insufficient-data';
    if (recentAvg>0&&avg>0) trend=recentAvg>avg*1.02?'up':recentAvg<avg*0.98?'down':'flat';
    return { total_quotes:validCount, last_paid:lastPaid, min_price:min||0, max_price:max||0, avg_price:avg, trend:trend, recent_avg:recentAvg, recent_count:recentCount,
        supplier_summary:Object.keys(supTotals).map(function(n){ return {supplier:n, avg_price:supTotals[n]/supCounts[n], quote_count:supCounts[n]}; }),
        lead_time_summary:Object.keys(ltCounts).map(function(lt){ return {lead_time:lt, count:ltCounts[lt]}; }) };
}

function miRender(data) {
    if (data.total_quotes===0) {
        document.getElementById('mi-body').innerHTML='<div class="mi-no-data"><div class="mi-no-data-icon">📊</div><div class="mi-no-data-text">No quote history found</div><div class="mi-no-data-sub">No previous quotes on record for this material</div></div>';
        return;
    }
    var html='<div class="mi-section"><div class="mi-section-label">Pricing</div><div class="mi-price-grid">';
    html+='<div class="mi-price-box hl"><div class="lbl">Last Paid</div><div class="val">'+miFmt(data.last_paid)+'</div></div>';
    html+='<div class="mi-price-box"><div class="lbl">Avg Price</div><div class="val">'+miFmt(data.avg_price)+'</div></div>';
    html+='<div class="mi-price-box"><div class="lbl">Min Price</div><div class="val">'+miFmt(data.min_price)+'</div></div>';
    html+='<div class="mi-price-box"><div class="lbl">Max Price</div><div class="val">'+miFmt(data.max_price)+'</div></div>';
    html+='</div><div class="mi-total-quotes">'+data.total_quotes+' total quotes</div></div>';
    html+='<div class="mi-section"><div class="mi-section-label">90-Day Trend</div>'+miTrendBadge(data.trend);
    if (data.recent_count>0) html+='<span style="font-size:11px;color:#aaa;margin-left:8px;">'+data.recent_count+' recent · avg '+miFmt(data.recent_avg)+'</span>';
    html+='</div>';
    if (data.supplier_summary&&data.supplier_summary.length>0) {
        var maxAvg=Math.max.apply(null,data.supplier_summary.map(function(s){return s.avg_price;}));
        html+='<div class="mi-section"><div class="mi-section-label">Suppliers</div><table class="mi-table"><thead><tr><th>Supplier</th><th>Avg/lb</th><th>Quotes</th></tr></thead><tbody>';
        data.supplier_summary.forEach(function(s){ var pct=maxAvg>0?Math.round((s.avg_price/maxAvg)*100):0; html+='<tr><td>'+s.supplier+'</td><td>'+miFmt(s.avg_price)+'<span class="mi-bar-wrap"><span class="mi-bar-fill" style="width:'+pct+'%"></span></span></td><td><span class="mi-badge">'+s.quote_count+'</span></td></tr>'; });
        html+='</tbody></table></div>';
    }
    if (data.lead_time_summary&&data.lead_time_summary.length>0) {
        var maxLT=Math.max.apply(null,data.lead_time_summary.map(function(l){return l.count;}));
        html+='<div class="mi-section"><div class="mi-section-label">Lead Times</div><table class="mi-table"><thead><tr><th>Lead Time</th><th>Frequency</th></tr></thead><tbody>';
        data.lead_time_summary.forEach(function(l){ var pct=maxLT>0?Math.round((l.count/maxLT)*100):0; html+='<tr><td>'+l.lead_time+'</td><td><span class="mi-bar-wrap"><span class="mi-bar-fill" style="width:'+pct+'%"></span></span> <span style="color:#aaa;font-size:11px;">'+l.count+'</span></td></tr>'; });
        html+='</tbody></table></div>';
    }
    document.getElementById('mi-body').innerHTML=html;
}

function miHandleTrigger(triggerVal) {
    try {
        var trigger = JSON.parse(triggerVal);
        if (trigger.type !== 'materialSelected') return;
        // Send to parent page (snippet listens there)
        try { window.parent.postMessage(trigger, '*'); } catch(e) {}
        miSetStatus('Sent to parent ✓');
    } catch(e) { miSetStatus('Parse err: ' + e.message); }
}

function miLoadData(tab,p) {
    var cacheKey=tab+'_'+p.material;
    if (miCache[cacheKey]) { miRender(miCache[cacheKey]); return; }
    document.getElementById('mi-body').innerHTML='<div class="mi-loading">Loading...</div>';
    var mt=p.materialType, sp=p.specification, ma=p.material, cu=p.manufacturerId;
    var criteria='(Material_Type == '+mt+' && Material_Form_Detail == '+sp+' && Material == '+ma+')';
    if (tab==='my'&&cu) criteria='(Material_Type == '+mt+' && Material_Form_Detail == '+sp+' && Material == '+ma+' && Customer_LU == '+cu+')';
    ZOHO.CREATOR.API.getAllRecords({ appName:'type-formsheet-2-18-21', reportName:'Material_Intelligence_Structural_RFQ_Sent', criteria:criteria, page:1, pageSize:200 })
    .then(function(response) {
        if (response&&response.code===3000) { var data=miProcessRecords(response.data); miCache[cacheKey]=data; miRender(data); }
        else if (response&&response.code===3100) { miRender(miProcessRecords([])); }
        else { document.getElementById('mi-body').innerHTML='<div class="mi-error">Query failed: '+JSON.stringify(response)+'</div>'; }
    }).catch(function(err) {
        if (err&&err.responseText&&err.responseText.indexOf('3100')!==-1) { miRender(miProcessRecords([])); }
        else { document.getElementById('mi-body').innerHTML='<div class="mi-error">Error: '+JSON.stringify(err)+'</div>'; }
    });
}

function miPoll() {
    var opts = {
        appName: 'type-formsheet-2-18-21',
        reportName: 'All_Mcp_customer_Projects',
        page: 1,
        pageSize: 1
    };
    // Best filter: specific project
    if (miProjectId) {
        opts.criteria = '(ID == ' + miProjectId + ')';
    // Next best: scope to manufacturer (prevents cross-manufacturer bleed)
    } else if (miManufacturerId) {
        opts.criteria = '(MANUFACTURE == ' + miManufacturerId + ')';
    }
    // No filter fallback only used on very first poll to bootstrap manufacturerId

    ZOHO.CREATOR.API.getAllRecords(opts)
    .then(function(response) {
        if (response && response.code === 3000 && response.data && response.data.length > 0) {
            var rec = response.data[0];
            // Bootstrap IDs from first record
            if (!miProjectId && rec.ID) miProjectId = rec.ID;
            if (!miManufacturerId && rec.MANUFACTURE) miManufacturerId = rec.MANUFACTURE;
            var triggerVal = rec.Intel_Trigger || '';
            miSetStatus('● ' + new Date().toLocaleTimeString() + ' mfg:' + (miManufacturerId ? miManufacturerId.toString().substring(0,6) : 'none'));
            if (miFirstPoll) { miFirstPoll = false; miLastTrigger = triggerVal; }
            else if (triggerVal && triggerVal !== miLastTrigger && triggerVal.indexOf('materialSelected') !== -1) {
                miLastTrigger = triggerVal;
                miHandleTrigger(triggerVal);
            }
        } else {
            miSetStatus('Poll: ' + JSON.stringify(response).substring(0,40));
        }
    }).catch(function(err){ miSetStatus('Poll err: ' + JSON.stringify(err).substring(0,30)); });
}

function miStartPolling() {
    miSetStatus('● ' + new Date().toLocaleTimeString());
    miPoll();
    setInterval(miPoll, 3000);
}

ZOHO.CREATOR.init().then(function() {
    try { ZOHO.CREATOR.UI.resize({ width:"1px", height:"1px" }); } catch(e) {}

    // Try getQueryParams (synchronous in some SDK versions)
    try {
        var qp = ZOHO.CREATOR.UTIL.getQueryParams();
        if (qp && qp.project_id) { miProjectId = qp.project_id; }
    } catch(e) {}

    // Try getCurrentPage to extract record ID
    if (!miProjectId) {
        try {
            var pageData = ZOHO.CREATOR.UTIL.getCurrentPageData
                         ? ZOHO.CREATOR.UTIL.getCurrentPageData()
                         : null;
            if (pageData && pageData.ID) miProjectId = pageData.ID;
        } catch(e) {}
    }

    miSetStatus('SDK OK id:' + (miProjectId || 'none'));
    miStartPolling();
}).catch(function(err) { miSetStatus('SDK err: ' + JSON.stringify(err).substring(0,30)); });
</script>
</body>
</html>
